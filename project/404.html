<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solstein — Page Not Found</title>
<link rel="stylesheet" href="solstein-tokens.css">
<link rel="stylesheet" href="solstein-app.css">
<link rel="stylesheet" href="solstein-toast.css">
<link rel="stylesheet" href="solstein-auth.css">

<style>
.err-code {
  font-family: var(--font-display);
  font-size: 96px;
  font-weight: 500;
  letter-spacing: 0.06em;
  line-height: 1;
  color: var(--sol-text);
  margin: 0 0 12px;
  text-align: center;
}
.err-code .glyph-line {
  display: block;
  width: 100%;
  height: 1px;
  background: var(--sol-hairline-strong);
  margin: 20px 0 28px;
}
.err-meta {
  margin: 22px 0 0;
  border-top: 1px solid var(--sol-hairline);
  padding-top: 16px;
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 8px 16px;
  font-size: 12.5px;
  align-items: baseline;
}
.err-meta dt {
  font-family: var(--font-display);
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--sol-text-3);
}
.err-meta dd {
  margin: 0;
  color: var(--sol-text-2);
  font-family: var(--font-code, ui-monospace, Menlo, monospace);
  font-size: 12px;
  overflow-wrap: anywhere;
}
.err-actions {
  display: flex;
  gap: 10px;
  margin-top: 22px;
}
.err-actions .btn-primary,
.err-actions .btn {
  flex: 1;
  height: 42px;
  text-decoration: none;
  font-size: 11px;
}
</style>
<script src="solstein-toast.js" defer></script>
</head>
<body>
<div class="auth-shell">

  <div class="auth-shell-top">
    <svg class="mark" viewBox="0 0 52 52" aria-hidden="true">
      <polygon points="26,4 40,12 44,26 40,40 26,48 12,40 8,26 12,12" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.9"></polygon>
      <polygon points="26,10 36,16 39,26 36,36 26,42 16,36 13,26 16,16" fill="none" stroke="currentColor" stroke-width="0.75" opacity="0.4"></polygon>
      <circle cx="26" cy="26" r="2.5" fill="currentColor"></circle>
    </svg>
    <span class="word">SOLSTEIN</span>
  </div>

  <div class="auth-shell-body">
    <div class="auth-card">
      <div class="err-code">404<span class="glyph-line"></span></div>
      <p class="auth-card-eyebrow" style="text-align: center;">§ Not Found</p>
      <h1 style="text-align: center;">Page Not Found</h1>
      <p class="sub" style="text-align: center;">The page you're looking for doesn't exist, or has been moved. Check the URL, or head back to your workspace.</p>

      <div class="err-actions">
        <a class="btn btn-primary" href="javascript:history.back()">Go Back</a>
      </div>
    </div>
  </div>

  <div class="auth-shell-foot">
    <span>© 2026 Solstein</span>
    <div class="links">
      <a href="terms.html">Terms</a>
      <a href="privacy.html">Privacy</a>
      <a href="https://status.solstein.app" target="_blank" rel="noopener">Status</a>
    </div>
  </div>

</div>
</body>
</html>
