<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Solstein — Signed Out</title>
<link rel="stylesheet" href="solstein-tokens.css">
<link rel="stylesheet" href="solstein-app.css">
<link rel="stylesheet" href="solstein-toast.css">
<link rel="stylesheet" href="solstein-auth.css">

<style>
.signoff-mark {
  width: 56px; height: 56px;
  margin: 0 auto 24px;
  color: var(--sol-accent);
  opacity: 0.85;
}
</style>
<script src="solstein-toast.js" defer></script>
</head>
<body>
<div class="auth-shell">

  <div class="auth-shell-top">
    <svg class="mark" viewBox="0 0 52 52" aria-hidden="true">
      <polygon points="26,4 40,12 44,26 40,40 26,48 12,40 8,26 12,12" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.9"></polygon>
      <polygon points="26,10 36,16 39,26 36,36 26,42 16,36 13,26 16,16" fill="none" stroke="currentColor" stroke-width="0.75" opacity="0.4"></polygon>
      <circle cx="26" cy="26" r="2.5" fill="currentColor"></circle>
    </svg>
    <span class="word">SOLSTEIN</span>
  </div>

  <div class="auth-shell-body">
    <div class="auth-card">
      <div style="text-align: center;">
        <svg class="signoff-mark" viewBox="0 0 52 52" aria-hidden="true">
          <polygon points="26,4 40,12 44,26 40,40 26,48 12,40 8,26 12,12" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"></polygon>
          <polygon points="26,12 35,17 38,26 35,35 26,40 17,35 14,26 17,17" fill="none" stroke="currentColor" stroke-width="0.75" opacity="0.25"></polygon>
          <circle cx="26" cy="26" r="1.5" fill="currentColor" opacity="0.6"></circle>
        </svg>

        <p class="auth-card-eyebrow">§ Session Ended</p>
        <h1>You're Signed Out</h1>
        <p class="sub">Your Solstein session has been closed on this device. Sign back in to return to your workspace, or close this tab to finish.</p>

        <a class="btn btn-primary" href="sign-in.html" style="text-decoration: none; display: inline-flex; width: 100%; margin-top: 8px; height: 44px;">Sign In</a>

        <div class="aux">
          Signed out by mistake? <a href="sign-in.html">Sign in again</a>
        </div>
      </div>
    </div>
  </div>

  <div class="auth-shell-foot">
    <span>© 2026 Solstein</span>
    <div class="links">
      <a href="terms.html">Terms</a>
      <a href="privacy.html">Privacy</a>
      <a href="https://status.solstein.app" target="_blank" rel="noopener">Status</a>
    </div>
  </div>

</div>
</body>
</html>
