<body>
  <!-- Read-only banner (shown when body[data-readonly] is set) -->
  <div class="sol-readonly-banner" role="status">
    <div class="sb-eyebrow" id="sb-eyebrow">§ Read-only</div>
    <div class="sb-copy" id="sb-copy">This project is read-only.</div>
    <a href="project.html" class="sb-back">← Back to project</a>
  </div>

  <!-- Dev toggle to demo read-only modes — gated to ?dev=1 so it never ships visibly -->
  <div class="sol-readonly-toggle" id="sol-readonly-toggle" hidden>
    <span class="sr-lbl">View as</span>
    <button type="button" data-mode="">Owner</button>
    <button type="button" data-mode="viewer">Viewer</button>
    <button type="button" data-mode="archived">Archived</button>
  </div>
  <script>
    // Reveal dev toggle only when ?dev=1 is in the URL
    if (new URLSearchParams(location.search).get('dev') === '1') {
      document.getElementById('sol-readonly-toggle').hidden = false;
    }
  </script>

  <script>
  (function () {
    var banner  = document.querySelector('.sol-readonly-banner');
    var eyebrow = document.getElementById('sb-eyebrow');
    var copy    = document.getElementById('sb-copy');

    function apply(mode) {
      if (mode === 'viewer' || mode === 'archived') {
        document.body.setAttribute('data-readonly', mode);
      } else {
        document.body.removeAttribute('data-readonly');
      }
      if (mode === 'viewer') {
        eyebrow.textContent = '§ Viewer';
        copy.innerHTML = 'You have <strong>viewer access</strong> to this project. Editing is disabled — contact the project owner for write access.';
      } else if (mode === 'archived') {
        eyebrow.textContent = '§ Archived';
        copy.innerHTML = 'This project is <strong>archived</strong>. The canvas is read-only until an owner unarchives it.';
      }
      // Sync toggle button highlight
      document.querySelectorAll('#sol-readonly-toggle button').forEach(function (b) {
        b.classList.toggle('is-on', (b.dataset.mode || '') === (mode || ''));
      });
    }

    // Boot from URL hash: #readonly=viewer | #readonly=archived
    var hash = location.hash || '';
    var m = hash.match(/readonly=(viewer|archived)/);
    apply(m ? m[1] : '');

    document.querySelectorAll('#sol-readonly-toggle button').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var mode = btn.dataset.mode || '';
        apply(mode);
        // Reflect in URL so a refresh keeps the state.
        if (mode) location.hash = 'readonly=' + mode;
        else if (location.hash) history.replaceState(null, '', location.pathname + location.search);
      });
    });
  })();
  </script>

  <div id="app"></div>

  <!-- Graph data (defines window.FLOWLENS_DATA) -->
  <script src="src/graph-data.js"></script>

  <!-- Layout configs + engine (must load before app) -->

  <script src="src/layoutEngine.js"></script>
  <script src="src/layoutOverrides.js"></script>
  <script src="src/categories.js"></script>
  <script src="src/nodeTypes.js"></script>
  <script src="src/edgeTypes.js"></script>
  <script src="src/lensMatch.js"></script>
  <script src="src/canvasRender.js"></script>

  <!-- App modules (order matters: leaf components first, app shell last) -->

  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/node.jsx"></script>
  <script type="text/babel" src="src/edge.jsx"></script>
  <script type="text/babel" src="src/canvas.jsx"></script>
  <script type="text/babel" src="src/editControls.jsx"></script>

  <script type="text/babel" src="src/addNodeModal.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
